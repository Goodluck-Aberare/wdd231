!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us | True Light Global Resource - Petroleum & Logistics Nigeria</title>
    
    <meta name="description" content="True Light Global Resource provides expert petroleum procurement, oil and gas logistics, and heavy-duty truck maintenance in Nigeria. Reliable energy solutions since 2026.">
    <meta name="author" content="Goodluck Aberare">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">
    <link rel="icon" href="images/favicon.ico">
</head>
<body>
    <header>
        <nav>
            <div class="brand">
                <img src="images/logo.jpg" alt="True Light Logo" width="50" height="50" loading="lazy">
                <span>True Light Global Resource</span>
            </div>
            <button id="menu-button" aria-label="Toggle Menu">☰</button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Request a Service Quote</h2>
        <form action="thank-you.html" method="get" class="contact-form">
            <label>Name: <input type="text" name="fname" required></label>
            <label>Email: <input type="email" name="email" required></label>
            <label>Service Type:
                <select name="service">
                    <option value="petroleum">Petroleum Procurement</option>
                    <option value="logistics">Logistics</option>
                    <option value="maintenance">Truck Maintenance</option>
                </select>
            </label>
            <label class="form-item-full">Comments: 
                <textarea name="comments" rows="4"></textarea>
            </label>
            <input type="submit" value="Send Request" class="cta-button">
        </form>
    </main>

    <footer>
        <p>&copy; 2026 True Light Global Resource</p>
    </footer>

    <script src="scripts/main.js" type="module"></script>
</body>
</html>
